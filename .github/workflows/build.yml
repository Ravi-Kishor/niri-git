name: Build niri-git (Zen 3 Optimized)

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      # -------------------------
      # Update Arch
      # -------------------------
      - name: Update Arch
        run: pacman -Syu --noconfirm

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install dependencies
        run: |
          pacman -S --noconfirm \
            base-devel git sudo pkgconf \
            cairo glib2 libdisplay-info libinput libxkbcommon \
            mesa pango pixman seatd systemd-libs \
            wayland wayland-protocols \
            pipewire libpipewire \
            clang llvm rust

      # -------------------------
      # Create builder user
      # -------------------------
      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder /home/builder

      # -------------------------
      # Create PKGBUILD
      # -------------------------
      - name: Create PKGBUILD
        run: |
          cat > /home/builder/PKGBUILD << 'EOF'
          pkgname=niri-git
          pkgver=0
          pkgrel=1
          pkgdesc="Scrollable-tiling Wayland compositor (Zen 3 optimized)"
          arch=(x86_64)
          url="https://github.com/niri-wm/niri"
          license=(GPL-3.0-or-later)

          depends=(
            cairo glib2 libdisplay-info libinput libpipewire libxkbcommon 
            mesa pango pixman seatd systemd-libs pipewire
          )

          makedepends=(clang llvm rust git pkgconf)

          provides=(niri wayland-compositor)
          conflicts=(niri niri-bin)

          # Keep LTO for real performance
          options=(!debug)

          source=("niri::git+$url.git")
          b2sums=('SKIP')

          pkgver() {
            cd niri
            git describe --long --tags --abbrev=7 2>/dev/null | \
              sed 's/\([^-]*-g\)/r\1/;s/-/./g;s/^v//' || \
            printf "r%s.%s" "$(git rev-list --count HEAD)" "$(git rev-parse --short HEAD)"
          }

          prepare() {
            cd niri
            cargo fetch --locked --target "$(rustc -vV | sed -n 's/host: //p')"
          }

          build() {
            cd niri

            # -------- Zen 3 CPU tuning --------
            export RUSTFLAGS="-C target-cpu=znver3 -C link-arg=-Wl,-O1"

            # -------- REAL Rust optimization --------
            export CARGO_PROFILE_RELEASE_LTO=true
            export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
            export CARGO_PROFILE_RELEASE_PANIC=abort

            # -------- Fix bindgen / pipewire issues --------
            export LIBCLANG_PATH="/usr/lib"
            export BINDGEN_EXTRA_CLANG_ARGS="$(pkg-config --cflags libpipewire-0.3 libspa-0.2)"

            # -------- Toolchain --------
            export CC=gcc
            export CXX=g++

            export CARGO_TARGET_DIR=target

            cargo build --frozen --release --target x86_64-unknown-linux-gnu
          }

          package() {
            cd niri
            install -Dm755 target/x86_64-unknown-linux-gnu/release/niri -t "$pkgdir/usr/bin/"
            install -Dm755 resources/niri-session -t "$pkgdir/usr/bin/"
            install -Dm644 resources/niri{.service,-shutdown.target} -t "$pkgdir/usr/lib/systemd/user/"
            install -Dm644 resources/niri.desktop -t "$pkgdir/usr/share/wayland-sessions/"
            install -Dm644 resources/niri-portals.conf -t "$pkgdir/usr/share/xdg-desktop-portal/"
            install -Dm644 resources/default-config.kdl -t "$pkgdir/usr/share/doc/niri/"
          }
          EOF

          chown builder:builder /home/builder/PKGBUILD

      # -------------------------
      # Build package
      # -------------------------
      - name: Build package
        run: |
          su builder -c '
            export MAKEFLAGS="-j$(nproc)"
            cd ~ && makepkg -s --noconfirm
          '

      # -------------------------
      # Prepare release
      # -------------------------
      - name: Prepare release
        id: pkg
        run: |
          PKG_PATH=$(find /home/builder -maxdepth 1 -type f -name "niri-git-*-x86_64.pkg.tar.zst")
          PKG_FILE=$(basename "$PKG_PATH")
          VERSION=$(echo "$PKG_FILE" | sed -E 's/^niri-git-(.*)-x86_64\.pkg\.tar\.zst/\1/')
          
          mkdir -p release
          NEW_FILE="niri-git-${VERSION}-znver3.pkg.tar.zst"
          cp "$PKG_PATH" "release/$NEW_FILE"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # -------------------------
      # Create GitHub Release
      # -------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}-znver3
          name: niri-git ${{ steps.pkg.outputs.version }} (Zen 3 Optimized)
          files: release/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
